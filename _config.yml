# 长期未活跃的友链
inactive_friends:
  # name: 网站名
  # avatar: 头像地址
  # site: 地址
  # description: 网站简介
  -
    name: Oranges
    avatar: https://hexo.theme.oranges.zcheng.site/images/avatar.png
    site: https://hexo.theme.oranges.zcheng.site/
    description:

# 页脚信息
footer:
  # social: 社交方式
  # more: 更多页脚信息
  social:
    # name: 名称
    # icon: 图标，目前仅支持IconFont部分图标
    # path: 地址

    # 按需取消注释以启用
    -
      name: github
      icon: github
      path: https://github.com/JEB-Bem
    # -
    #   name: email
    #   icon: envelope
    #   path: 
    # -
    #   name: facebook
    #   icon: facebooksquare
    #   path:
    # -
    #   name: twitter
    #   icon: twitter
    #   path:
    # -
    #   name: wechat
    #   icon: wechat
    #   path:
    # -
    #   name: weibo
    #   icon: weibo
    #   path:
    -
      # rss需安装 hexo-generator-feed 插件
      # 具体参照https://github.com/hexojs/hexo-generator-feed
      name: rss
      icon: rss
      path: /atom.xml

  more:
    # 支持变量显示，可自定义扩展，具体见主题/layout/_partial/footer.ejs
    # 一般用来显示根据各种场景需要切换的文本，如时间年份
    # 如：{thisYear} 会被替换为今年年份
    -
      name: Create Common License BY-NC-ND 4.0
      path: https://creativecommons.org/licenses/by-nc-nd/4.0/
    -
      name: Themed by Oranges | Powered by Hexo
      path: https://github.com/zchengsite/hexo-theme-oranges

  # 浏览量统计
  # http://busuanzi.ibruce.info/
  views:
    enable: true
    provider: '//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js'
    item:
      -
        enable: true
        id: busuanzi_value_site_pv
        name: tv
        unit: 
      -
        enable: true
        id: busuanzi_value_page_pv
        name: av
        unit: 
      -
        enable: true
        id: busuanzi_value_site_uv
        name: uv
        unit: 

# 文章搜索
search:
  enable: false
  placeholder: 

# 深/浅配色切换
colorSwitch:
  enable: true

# 文章分享
postShare:
  enable: false

  twitter:
    enable: true

  facebook:
    enable: true

# MathJax Support
# 数学公式支持
mathjax:
  enable: false

# cdn配置，默认关闭，如需启动，先确保对应插件版本cdn资源可用后再开启
# 如资源加载失败，可替换cdn提供商或设置enable:false默认走本地资源
# 也可使用自己的cdn服务，资源在/theme/oranges/source/plugins下
cdns:
  jquery:
    enable: false
    url: https://cdn.jsdelivr.net/npm/jquery@3.3.1/dist/jquery.min.js

  fancybox:
    enable: false
    url:
      css: https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.css
      js: https://cdn.jsdelivr.net/npm/@fancyapps/fancybox@3.5.7/dist/jquery.fancybox.min.js

  # LaTeX 公式
  mathjax:
    enable: false
    url: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js

# 主题色
themeColor: '#86bdf3'
