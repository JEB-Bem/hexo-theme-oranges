# 相关配置说明
  # favicon: 网站图标
  # avatar: 主题用户头像与昵称
  # rss: rss订阅
  # gtag: Google 分析
  # giscus: 评论系统
  # navbar: 主题页面导航栏
  # catalog: 文章目录
  # prevnext: 文章末尾的上一页与下一页
  # friends: 友链
  # footer: 页脚信息
  # search: 文章搜索
  # colorSwitch: 深/浅配色切换
  # postShare: 文章分享
  # codeBlock: 代码块配置

# enable: 是否开启相应功能，可选true || false

# 网站图标
favicon:
  enable: true
  icon: /images/favicon.png
  touch_icon: /images/favicon.png

# 用户头像与昵称
avatar:
  author_photo: /images/avatar.png
  author_nickname: <span style="color:#86bdf3;"><i>JEB</i></span>em
  path: /

# Google 分析
# https://analytics.google.com
# 注册Google分析账号，在管理/创建媒体资源/选择网站/填写相关信息后得到跟踪Id，一般格式为UA-xxxxxxx-x
# 如之前已有注册账号，在管理/跟踪信息/跟踪代码/找到跟踪ID，一般格式为UA-xxxxxxx-x
gtag:
  enable: true
  gtagkey: G-V5HWSLR4KF

baidu_s:
  enable: true
  key: codeva-69rEXbPcZd

# Giscus 评论系统
giscus:
  enable: true
  repo: JEB-Bem/JBlog
  repo_id: R_kgDOQMmpRw
  category: Announcements
  category_id: DIC_kwDOQMmpR84Cxks2
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  lang: zh-CN
  loading: lazy

# 主题页面导航栏
navbar:
  -
    name: Home
    enable: true
    path: /
    key: home
  -
    name: Archives
    enable: true
    path: /archives/
    key: archives
  -
    name: Categories
    enable: true
    path: /categories/
    key: categories
  -
    name: Tags
    enable: true
    path: /tags/
    key: tags
  -
    name: Presentations
    enable: true
    path: /presentations/
    key: presentations
  -
    name: Tools
    enable: true
    path: /tools/
    key: tools
  -
    name: Friends
    enable: true
    path: /friends/
    key: friends
  -
    name: About
    enable: true
    path: /about/
    key: about

# 文章目录
catalog:
  enable: true

# 文章末尾的上一页与下一页
prevnext:
  enable: true

# 友链详细信息：支持多个友链
friends:
  # name: 网站名
  # avatar: 头像地址
  # site: 地址
